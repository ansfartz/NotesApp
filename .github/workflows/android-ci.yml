# GitHub Actions workflow for NotesApp
# Runs unit tests and instrumented tests on every pull request.

name: Tests

# ── TRIGGER ──────────────────────────────────────────────────
# This workflow runs when a PR is opened, updated, or reopened
# against the main branch.
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# ── JOBS ─────────────────────────────────────────────────────
jobs:

  # ╭──────────────────────────────────────────╮
  # │  Job 1: Unit tests (fast, no emulator)   │
  # ╰──────────────────────────────────────────╯
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install a JDK (Android Gradle needs Java 17+)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. OPTIONAL: Cache Gradle files so future runs are faster
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # 4. Make the Gradle wrapper executable
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Run unit tests
      - name: Run unit tests
        run: ./gradlew test

  # ╭──────────────────────────────────────────────────╮
  # │  Job 2: Instrumented tests (needs an emulator)   │
  # ╰──────────────────────────────────────────────────╯
  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Enable KVM (hardware acceleration) for the Android emulator
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Boot an emulator and run connectedAndroidTest
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          emulator-options: -no-window -no-audio -no-snapshot
          script: ./gradlew connectedAndroidTest
